name: 🚀 Android — Build & Submit to Play Store

on:
  push:
    branches: [master]
  workflow_dispatch: # allow manual trigger from GitHub UI

concurrency:
  group: android-release
  cancel-in-progress: true # cancel any in-progress build if a new push arrives

jobs:
  build-and-submit:
    name: Build AAB & Submit to Play Store (Cloud)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node.js ───────────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── Java ─────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # ── npm dependencies ──────────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      # ── EAS CLI ───────────────────────────────────────────────────────────
      - name: Install EAS CLI
        run: npm install -g eas-cli

      # ── Build & Submit via Local Runner ──────────────────────────────────
      - name: Build & Submit Android production AAB
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          ANDROID_SERVICE_ACCOUNT_JSON: ${{ secrets.ANDROID_SERVICE_ACCOUNT_JSON }}
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_GEMINI_API_KEY: ${{ secrets.EXPO_PUBLIC_GEMINI_API_KEY }}
        run: |
          echo "$ANDROID_SERVICE_ACCOUNT_JSON" > pc-api-key.json
          eas build \
            --platform android \
            --profile production \
            --local \
            --auto-submit \
            --non-interactive

      # ── Upload Artifact ──────────────────────────────────────────────────
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab
          path: ./*.aab
          if-no-files-found: error
