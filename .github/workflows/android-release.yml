name: 🚀 Android — Build & Submit to Play Store

on:
  push:
    branches: [main]
  workflow_dispatch:         # allow manual trigger from GitHub UI

concurrency:
  group: android-release
  cancel-in-progress: true  # cancel any in-progress build if a new push arrives

jobs:
  build-and-submit:
    name: Build AAB & Submit to Play Store
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node.js ───────────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── Java (required for Android Gradle build) ───────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── Android SDK cache ─────────────────────────────────────────────────
      - name: Cache Android SDK
        uses: android-actions/setup-android@v3

      # ── npm dependencies ──────────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ── EAS CLI ───────────────────────────────────────────────────────────
      - name: Install EAS CLI
        run: npm install -g eas-cli

      # ── Build AAB locally (uses EAS credentials from Expo servers) ────────
      - name: Build Android production AAB
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build \
            --platform android \
            --profile production \
            --local \
            --non-interactive \
            --output ./build/app-release.aab

      # ── Upload build artifact (optional - so you can download it) ─────────
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-${{ github.run_number }}
          path: ./build/app-release.aab
          retention-days: 30

      # ── Submit AAB to Play Store internal testing ─────────────────────────
      - name: Submit to Google Play Store (internal testing)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas submit \
            --platform android \
            --path ./build/app-release.aab \
            --non-interactive
