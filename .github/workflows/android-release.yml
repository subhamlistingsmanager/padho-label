name: 🚀 Android — Build & Submit to Play Store

on:
  push:
    branches: [master]
  workflow_dispatch:         # allow manual trigger from GitHub UI

concurrency:
  group: android-release
  cancel-in-progress: true  # cancel any in-progress build if a new push arrives

jobs:
  build-and-submit:
    name: Build AAB & Submit to Play Store (Cloud)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node.js ───────────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── npm dependencies ──────────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ── EAS CLI ───────────────────────────────────────────────────────────
      - name: Install EAS CLI
        run: npm install -g eas-cli

      # ── Build & Submit via EAS Cloud ─────────────────────────────────────
      - name: Build & Submit Android production AAB
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build \
            --platform android \
            --profile production \
            --auto-submit \
            --non-interactive
